name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run regression tests
        run: bash tests/regression.sh

  validate-docs-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docs-index.md URLs
        run: |
          set -euo pipefail
          docs_file="plugins/e2e/skills/use-e2e-cloud/references/docs-index.md"
          fail=0
          while IFS= read -r url; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" 2>/dev/null)
            curl_rc=$?
            if [[ $curl_rc -ne 0 ]]; then
              printf 'FAIL curl-error(%d): %s\n' "$curl_rc" "$url" >&2
              fail=1
            elif [[ "$status" == "404" ]]; then
              printf 'FAIL 404: %s\n' "$url" >&2
              fail=1
            else
              printf 'OK %s: %s\n' "$status" "$url"
            fi
          done < <(grep -oE 'https://docs\.e2enetworks\.com[^`"[:space:]]+' "$docs_file")
          exit $fail
